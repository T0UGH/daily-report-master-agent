version: 1
repo_root: /Users/haha/workspace/daily-report-master-agent
paths:
  signals_root: ~/.daily-lane-data/signals
  runtime_root: ~/.daily-lane-data/runtime/daily-report-master
  reports_root: ~/.daily-lane-data/reports
  drafts_root: ~/.daily-lane-data/drafts
  reviews_root: ~/.daily-lane-data/reviews
  contracts_dir: /Users/haha/workspace/daily-report-master-agent/contracts
  helpers_dir: /Users/haha/workspace/daily-report-master-agent/helpers
  templates_dir: /Users/haha/workspace/daily-report-master-agent/templates
selection:
  default_per_lane_limit: 10
  per_lane_limits:
    x-feed: 10
    x-following: 10
    reddit-watch: 10
    hacker-news-watch: 10
    hacker-news-search-watch: 10
    claude-code-watch: 10
    codex-watch: 10
    openclaw-watch: 10
    github-trending-weekly: 10
    product-hunt-watch: 10
    polymarket-watch: 10
    weather-watch: 1
reader_facing:
  title_template: "AI Agent 日报（{report_date}）"
  lane_paragraph_targets:
    x-feed:
      min_paragraphs: 6
      max_paragraphs: 10
    x-following:
      min_paragraphs: 6
      max_paragraphs: 10
  fixed_section_order:
    - weather-watch
    - x-feed
    - x-following
    - reddit-watch
    - hacker-news-watch
    - hacker-news-search-watch
    - claude-code-watch
    - codex-watch
    - openclaw-watch
    - github-trending-weekly
    - product-hunt-watch
    - polymarket-watch
runtime:
  timezone: Asia/Shanghai
  cron_job_name: daily-report-master-0600
  cron_schedule: "0 6 * * *"
  cron_deliver: feishu
archive:
  knowledge_wiki:
    repo_root: /Users/haha/workspace/knowledge-wiki
    remote: origin
    branch: main
    daily_report_dir: raw/inbound/ai-daily-report
audio:
  tts:
    provider: minimax
    default_voice_id: "Chinese (Mandarin)_Soft_Girl"
    model: speech-2.8-hd
    intermediate_format: mp3
  delivery:
    platform: feishu
    receive_id_env: FEISHU_HOME_CHANNEL
    receive_id_type: chat_id
    native_audio_format: opus
